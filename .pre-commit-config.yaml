# Thanks GPT
repos:
    # --- Backend: Ruff Formatting & Linting ---
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.11.0
      hooks:
          - id: ruff
            name: Ruff Linter
            args: [--fix]
          - id: ruff-format
            name: Ruff Formatter

